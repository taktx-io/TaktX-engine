# Enable JaCoCo for Quarkus tests
quarkus.jacoco.includes=io.taktx.*
quarkus.jacoco.excludes=io.taktx.dto.**,io.taktx.bpmn.**
quarkus.jacoco.report-location=build/reports/jacoco-quarkus
quarkus.jacoco.data-file=build/jacoco-quarkus.exec

# Required tenant/namespace configuration for tests
taktx.engine.tenant-id=test-tenant
taktx.engine.namespace=default
taktx.engine.topic.prefix=test-tenant.default
quarkus.kafka-streams.application-id=test-tenant.default.taktx-engine

# Skip poison records in Kafka Streams rather than stopping the stream thread.
quarkus.kafka-streams.default-deserialization-exception-handler=io.taktx.engine.generic.ContinueOnDeserializationErrorHandler

