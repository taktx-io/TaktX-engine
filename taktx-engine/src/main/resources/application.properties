#
# Base application.properties with defaults

# Core Engine Configuration
takt.engine.keyvaluestoretype=${TAKT_KV_STORE_TYPE:inmemory}
takt.engine.tenant=${TAKT_TENANT:tenant}
takt.engine.namespace=${TAKT_NAMESPACE:namespace}
takt.engine.topic.replication-factor=${TAKT_TOPIC_REPLICATION:1}
takt.engine.topic.partitions=${TAKT_TOPIC_PARTITIONS:3}

# Kafka Configuration
%prd.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
kafka.num.stream.threads=${KAFKA_STREAM_THREADS:3}
kafka-streams.consumer.session.timeout.ms=${KAFKA_CONSUMER_TIMEOUT:10000}
kafka-streams.consumer.heartbeat.interval.ms=${KAFKA_HEARTBEAT_INTERVAL:1000}
kafka-streams.commit.interval.ms=${KAFKA_COMMIT_INTERVAL:1000}
kafka-streams.metadata.max.age.ms=${KAFKA_METADATA_MAX_AGE:500}
kafka-streams.auto.offset.reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
kafka-streams.metrics.recording.level=${KAFKA_METRICS_LEVEL:INFO}
kafka-streams.poll.ms=${KAFKA_POLL_MS:100}
kafka.ssl.endpoint.identification.algorithm=${KAFKA_SSL_ENDPOINT_IDENTIFICATION:}
kafka.ssl.truststore.type=${KAFKA_SSL_TRUSTSTORE_TYPE:}
kafka.ssl.truststore.location=${KAFKA_SSL_TRUSTSTORE_LOCATION:}
kafka.ssl.truststore.password=${KAFKA_SSL_TRUSTSTORE_PASSWORD:}

# Security Configuration (with empty defaults for sensitive values)
kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
kafka.sasl.mechanism=${KAFKA_SASL_MECHANISM:}
kafka.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:}

# Application Server Configuration
quarkus.kafka-streams.application-server=${TAKT_HOST:localhost}:${TAKT_PORT:8080}
quarkus.kafka-streams.application-id=${TAKT_APPLICATION_ID:taktx-engine}

# Best practice for higher availability in Apache Kafka clients prior to 3.0
quarkus.kafka-streams.topics=${takt.engine.tenant}.${takt.engine.namespace}.definitions-trigger,${takt.engine.tenant}.${takt.engine.namespace}.process-definition-activation,${takt.engine.tenant}.${takt.engine.namespace}.schedule-commands,${takt.engine.tenant}.${takt.engine.namespace}.process-instance-trigger,${takt.engine.tenant}.${takt.engine.namespace}.instance-update

quarkus.log.level=INFO
quarkus.banner.enabled=false

quarkus.micrometer.binder-enabled-default=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.export.prometheus.enabled=true