# Base application.properties with defaults
quarkus.http.port=8079
# In test mode each Quarkus instance (default profile + security-test profile restart) must use
# a different HTTP port so that profile restarts do not cause QuarkusBindException.
%test.quarkus.http.port=0
%security-test.quarkus.http.port=0
quarkus.analytics.disabled=true
kafka.devservices.auto-create-topics=false
quarkus.swagger-ui.always-include=true
quarkus.kafka.devservices.port=9092
# Security-test profile gets its own Kafka container on a separate port so the engine starts
# with a clean broker - no historical messages from default-profile tests to replay.
# Without this, the new Kafka Streams instance resets to earliest and spends seconds (or longer)
# replaying old StartCommandDTO records before it can process new test commands, causing
# validJwt_commandAccepted_processInstanceStarted (and others) to time out.
%security-test.quarkus.kafka.devservices.port=9093
# Core Engine Configuration
taktx.engine.keyvaluestoretype=${TAKTX_KV_STORE_TYPE:inmemory}
taktx.engine.host=${TAKTX_HOST:localhost}
taktx.engine.port=${TAKTX_PORT:8079}
taktx.engine.tenant-id=${TAKTX_ENGINE_TENANT_ID}
taktx.engine.namespace=${TAKTX_ENGINE_NAMESPACE}
# Derived topic prefix ? always <tenant-id>.<namespace>. Never set this directly.
taktx.engine.topic.prefix=${taktx.engine.tenant-id}.${taktx.engine.namespace}
taktx.engine.topic.replication-factor=${TAKTX_TOPIC_REPLICATION:1}

# Skip poison records in Kafka Streams rather than stopping the stream thread.
# Full details (topic, partition, offset, error) are logged at ERROR level.
quarkus.kafka-streams.default-deserialization-exception-handler=io.taktx.engine.generic.ContinueOnDeserializationErrorHandler
taktx.engine.topic.partitions=${TAKTX_TOPIC_PARTITIONS:3}
taktx.engine.topicCreationEnabled=${TAKTX_TOPIC_MANAGEMENT_ENABLED:true}
taktx.engine.licenseFileLocation=${TAKTX_LICENSE_FILE_LOCATION:-}

# Kafka Configuration
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.num.stream.threads=${KAFKA_STREAM_THREADS:3}
kafka-streams.poll.ms=${KAFKA_POLL_MS:50}
kafka-streams.commit.interval.ms=${KAFKA_COMMIT_INTERVAL:100}
kafka-streams.auto.offset.reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
kafka-streams.metrics.recording.level=${KAFKA_METRICS_LEVEL:INFO}
kafka-streams.metadata.max.age.ms=${KAFKA_METADATA_MAX_AGE:60000}

kafka-streams.consumer.session.timeout.ms=${KAFKA_CONSUMER_TIMEOUT:10000}
kafka-streams.consumer.heartbeat.interval.ms=${KAFKA_CONSUMER_HEARTBEAT_INTERVAL:1000}
kafka-streams.consumer.fetch.min.bytes=${KAFKA_CONSUMER_FETCH_MIN_BYTES:262144}
kafka-streams.consumer.fetch.max.wait.ms=${KAFKA_CONSUMER_FETCH_MAX_WAIT_MS:50}
kafka-streams.consumer.max.partition.fetch.bytes=${KAFKA_CONSUMER_MAX_PARTITION_FETCH_BYTES:2097152}
kafka-streams.consumer.max.poll.records=${KAFKA_CONSUMER_MAX_POLL_RECORDS:10000}

kafka-streams.producer.batch.size=${KAFKA_PRODUCER_BATCH_SIZE:262144}
kafka-streams.producer.linger.ms=${KAFKA_PRODUCER_LINGER_MS:50}
kafka-streams.producer.compression.type=${KAFKA_PRODUCER_COMPRESSION_TYPE:none}
kafka-streams.producer.acks=${KAFKA_PRODUCER_ACKS:all}
kafka-streams.producer.enable.idempotence=${KAFKA_PRODUCER_ENABLE_IDEMPOTENCE:true}
kafka-streams.producer.max.in.flight.requests.per.connection=${KAFKA_PRODUCER_MAX_IN_FLIGHT_REQUESTS_PER_CONNECTION:5}

kafka.ssl.endpoint.identification.algorithm=${KAFKA_SSL_ENDPOINT_IDENTIFICATION:}
kafka.ssl.truststore.type=${KAFKA_SSL_TRUSTSTORE_TYPE:}
kafka.ssl.truststore.location=${KAFKA_SSL_TRUSTSTORE_LOCATION:}
kafka.ssl.truststore.password=${KAFKA_SSL_TRUSTSTORE_PASSWORD:}

# Security Configuration (with empty defaults for sensitive values)
kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
kafka.sasl.mechanism=${KAFKA_SASL_MECHANISM:}
kafka.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:}

# Application Server Configuration
quarkus.kafka-streams.application-server=${TAKTX_HOST:localhost}:${TAKTX_PORT:8080}
# Prefix the application-id with the topic prefix so that Kafka Streams internal topics
# (changelog, repartition) are named <tenantId>.<namespace>.taktx-engine-...-changelog.
# This ensures all topics for a tenant share the same ACL prefix (<tenantId>.<namespace>.*).
# Override TAKTX_APPLICATION_ID only if you need a non-standard application id.
quarkus.kafka-streams.application-id=${taktx.engine.tenant-id}.${taktx.engine.namespace}.taktx-engine

# Best practice for higher availability in Apache Kafka clients prior to 3.0
quarkus.kafka-streams.topics=${taktx.engine.topic.prefix}.process-definition-activation,${taktx.engine.topic.prefix}.message-event,${taktx.engine.topic.prefix}.schedule-commands,${taktx.engine.topic.prefix}.instance-update,${taktx.engine.topic.prefix}.process-instance,${taktx.engine.topic.prefix}.topic-meta-requested,${taktx.engine.topic.prefix}.topic-meta-actual,${taktx.engine.topic.prefix}.definitions,${taktx.engine.topic.prefix}.taktx-configuration,${taktx.engine.topic.prefix}.taktx-signing-keys

# Security: platform trust anchor
# Runtime authorization/signing switches are driven by taktx-configuration topic updates.
# Keep only secrets/bootstrap settings in env vars.
# Shared signing identity source for this process: engine defaults to generated when unset,
# workers/clients default to env in their own runtime code.
# Set to "env" to reuse TAKTX_SIGNING_PRIVATE_KEY / TAKTX_SIGNING_PUBLIC_KEY / TAKTX_SIGNING_KEY_ID,
# or set to "file" to read mounted files from TAKTX_SIGNING_FILE_*_PATH.
taktx.signing.identity-source=${TAKTX_SIGNING_IDENTITY_SOURCE:}
taktx.signing.file.key-id-path=${TAKTX_SIGNING_FILE_KEY_ID_PATH:${TAKTX_SIGNING_KEY_ID_FILE:}}
taktx.signing.file.private-key-path=${TAKTX_SIGNING_FILE_PRIVATE_KEY_PATH:${TAKTX_SIGNING_PRIVATE_KEY_FILE:}}
taktx.signing.file.public-key-path=${TAKTX_SIGNING_FILE_PUBLIC_KEY_PATH:${TAKTX_SIGNING_PUBLIC_KEY_FILE:}}
taktx.signing.file.refresh-interval-ms=${TAKTX_SIGNING_FILE_REFRESH_INTERVAL_MS:1000}

# ?? Root-trust-chain (anchored mode) ?????????????????????????????????????????
# TAKTX_PLATFORM_PUBLIC_KEY activates anchored mode.
# When set, ALL keys in taktx-signing-keys (ENGINE and CLIENT roles) must carry a
# valid RSA/SHA-256 countersignature from the platform root private key.
# When absent, community mode applies (OpenKeyTrustPolicy ? honor-system).
# Format: base64-encoded DER X.509 RSA public key. Minimum 2048-bit.
# Generate the full trust anchor with: scripts/generate_trust_anchor.sh
taktx.platform.public-key=${TAKTX_PLATFORM_PUBLIC_KEY:}

# TAKTX_ENGINE_KEY_REGISTRATION_SIGNATURE ? required in anchored mode when using a
# stable signing source (file or env). Base64-encoded RSA/SHA-256 signature over:
#   keyId|publicKeyBase64|Ed25519|engine|ENGINE
# Generate with: scripts/generate_trust_anchor.sh --engine
# NOTE: incompatible with TAKTX_SIGNING_IDENTITY_SOURCE=generated (key changes on restart).
taktx.engine.key-registration-signature=${TAKTX_ENGINE_KEY_REGISTRATION_SIGNATURE:}



quarkus.log.level=INFO
quarkus.banner.enabled=false

quarkus.micrometer.binder-enabled-default=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.export.prometheus.enabled=true