# Base application.properties with defaults
quarkus.analytics.disabled=true
kafka.devservices.auto-create-topics=false
quarkus.swagger-ui.always-include=true
quarkus.kafka.devservices.port=9092

# Core Engine Configuration
taktx.engine.keyvaluestoretype=${TAKTX_KV_STORE_TYPE:inmemory}
taktx.engine.host=${TAKTX_HOST:localhost}
taktx.engine.port=${TAKTX_PORT:8080}
taktx.engine.tenant=${TAKTX_TENANT:tenant}
taktx.engine.namespace=${TAKTX_NAMESPACE:namespace}
taktx.engine.topic.replication-factor=${TAKTX_TOPIC_REPLICATION:1}
taktx.engine.topic.partitions=${TAKTX_TOPIC_PARTITIONS:3}
taktx.engine.topicCreationEnabled=${TAKTX_TOPIC_MANAGEMENT_ENABLED:true}
taktx.engine.broadcastInstanceUpdates=${TAKTX_BROADCAST_INSTANCE_UPDATES:true}

# Kafka Configuration
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.num.stream.threads=${KAFKA_STREAM_THREADS:3}

kafka-streams.cache.max.bytes.buffering=${KAFKA_CACHE_MAX_BYTES_BUFFERING:536870912}
kafka-streams.topology.optimization=${KAFKA_TOPOLOGY_OPTIMIZATION:all}
kafka-streams.processing.guarantee=${KAFKA_PROCESSING_GUARANTEE:exactly_once_v2}
kafka-streams.replication.factor=${KAFKA_STREAMS_REPLICATION_FACTOR:1}
kafka-streams.commit.interval.ms=${KAFKA_COMMIT_INTERVAL:1000}
kafka-streams.metadata.max.age.ms=${KAFKA_METADATA_MAX_AGE:60000}
kafka-streams.auto.offset.reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
kafka-streams.metrics.recording.level=${KAFKA_METRICS_LEVEL:INFO}

# Producer (Streams internal)
kafka-streams.producer.compression.type=${KAFKA_COMPRESSION_TYPE:zstd}
kafka-streams.producer.batch.size=${KAFKA_BATCH_SIZE:262144}
kafka-streams.producer.linger.ms=${KAFKA_LINGER_MS:100}
kafka-streams.producer.buffer.memory=${KAFKA_BUFFER_MEMORY:33554432}
kafka-streams.producer.max.in.flight.requests.per.connection=${KAFKA_MAX_IN_FLIGHT_REQUESTS_PER_CONNECTION:5}
kafka-streams.producer.delivery.timeout.ms=${KAFKA_DELIVERY_TIMEOUT_MS:120000}

# Consumer (Streams internal)
kafka-streams.consumer.fetch.min.bytes=${KAFKA_FETCH_MIN_BYTES:1048576}
kafka-streams.consumer.fetch.max.wait.ms=${KAFKA_FETCH_MAX_WAIT_MS:100}
kafka-streams.consumer.max.partition.fetch.bytes=${KAFKA_MAX_PARTITION_FETCH_BYTES:16777216}
kafka-streams.consumer.max.poll.records=${KAFKA_MAX_POLL_RECORDS:2000}
kafka-streams.consumer.session.timeout.ms=${KAFKA_CONSUMER_TIMEOUT:10000}
kafka-streams.consumer.heartbeat.interval.ms=${KAFKA_HEARTBEAT_INTERVAL:1000}

kafka.ssl.endpoint.identification.algorithm=${KAFKA_SSL_ENDPOINT_IDENTIFICATION:}
kafka.ssl.truststore.type=${KAFKA_SSL_TRUSTSTORE_TYPE:}
kafka.ssl.truststore.location=${KAFKA_SSL_TRUSTSTORE_LOCATION:}
kafka.ssl.truststore.password=${KAFKA_SSL_TRUSTSTORE_PASSWORD:}

# Security Configuration (with empty defaults for sensitive values)
kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
kafka.sasl.mechanism=${KAFKA_SASL_MECHANISM:}
kafka.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:}

# Application Server Configuration
quarkus.kafka-streams.application-server=${TAKTX_HOST:localhost}:${TAKTX_PORT:8080}
quarkus.kafka-streams.application-id=${TAKTX_APPLICATION_ID:taktx-engine}

# Best practice for higher availability in Apache Kafka clients prior to 3.0
quarkus.kafka-streams.topics=${taktx.engine.tenant}.${taktx.engine.namespace}.process-definition-activation,${taktx.engine.tenant}.${taktx.engine.namespace}.message-event,${taktx.engine.tenant}.${taktx.engine.namespace}.schedule-commands,${taktx.engine.tenant}.${taktx.engine.namespace}.instance-update,${taktx.engine.tenant}.${taktx.engine.namespace}.process-instance,${taktx.engine.tenant}.${taktx.engine.namespace}.topic-meta-requested,${taktx.engine.tenant}.${taktx.engine.namespace}.topic-meta-actual,${taktx.engine.tenant}.${taktx.engine.namespace}.definitions

quarkus.log.level=INFO
quarkus.banner.enabled=false

quarkus.micrometer.binder-enabled-default=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.export.prometheus.enabled=true