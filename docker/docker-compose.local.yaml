version: "3.8"
name: bpmnmeister

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.6
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    expose:
      - 2181
    networks:
      - dev

  kafka:
    image: confluentinc/cp-kafka:7.2.6
    hostname: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://localhost:9092,CLIENT://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CLIENT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - dev

  kafka-ui:
    image: provectuslabs/kafka-ui
    ports:
      - "9095:8080"
    restart: always
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9093
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    networks:
      - dev

  mongo-1:
    image: mongo:4.4.11
    container_name: mongo-1
    command: --replSet rs0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=testdb
    volumes:
      - data:/data
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/admin --quiet
      interval: 2s
      timeout: 3s
      retries: 5

  # copied from https://stackoverflow.com/a/52944387/4185106
  mongo-init:
    image: mongo:4.4.11
    container_name: mongo_init
    restart: "no"
    depends_on:
      mongo-1:
        condition: service_healthy
    command: >
      mongo --host mongo-1:27017 --eval
      '
      rs.initiate( {
         _id : "rs0",
         members: [
            { _id: 0, host: "mongo-1:27017" }
         ]
      })
      '

  mongo-express:
    image: mongo-express
    hostname: mongo-express
    restart: always
    depends_on:
      mongo-1:
        condition: service_healthy
    ports:
      - 8091:8081
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo-1

volumes:
  data: {}

networks:
  dev:
    name: bpmnmeister-dev
