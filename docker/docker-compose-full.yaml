version: "3.9"
services:
  kafka:
    image: 'bitnami/kafka:latest'
    ports:
      - '9095:9095' #1
      - '9094:9094' #1
      - '9092:9092' #1
    environment:
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_CONTROLLER_BROKER_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9094,CONTROLLER://:9093,EXTERNAL://:9092,DOCKER://:9095
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092,DOCKER://host.docker.internal:9095
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT,DOCKER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
# If you want to persist data on the host locally, uncomment the following lines
#    volumes:
#      - ./kafka/data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 1s

  kafka-ui:
    image: 'provectuslabs/kafka-ui:latest'
    ports:
      - '8085:8080'
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local #5
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9094 #6
      - KAFKA_CLUSTERS_0_PROPERTIES_CONSUMER_KEY_DESERIALIZER=org.apache.kafka.common.serialization.HexDeserializer
      - KAFKA_CLUSTERS_0_PROPERTIES_CONSUMER_VALUE_DESERIALIZER=org.apache.kafka.common.serialization.HexDeserializer
      - KAFKA_CLUSTERS_0_PROPERTIES_PRODUCER_KEY_SERIALIZER=org.apache.kafka.common.serialization.HexSerializer
      - KAFKA_CLUSTERS_0_PROPERTIES_PRODUCER_VALUE_SERIALIZER=org.apache.kafka.common.serialization.HexSerializer

  taktx:
    image: ghcr.io/taktx-io/taktx-engine:0.0.8-alpha-7
    ports:
      - 8080:8080
    depends_on:
      - kafka
    environment:
        - KAFKA_BOOTSTRAP_SERVERS=kafka:9094
        # Both TAKTX_ENGINE_TENANT_ID and TAKTX_ENGINE_NAMESPACE are required.
        # Topics are named: <tenantId>.<namespace>.<topic>
        - TAKTX_ENGINE_TENANT_ID=acme
        - TAKTX_ENGINE_NAMESPACE=default
        # All topic names (including Kafka Streams changelogs) are derived automatically:
        #   regular topics : <TAKTX_ENGINE_TENANT_ID>.<TAKTX_ENGINE_NAMESPACE>.<topic>
        #   changelog topics: <TAKTX_ENGINE_TENANT_ID>.<TAKTX_ENGINE_NAMESPACE>.taktx-engine-...-changelog
        # Both sets fall under the same ACL prefix <TAKTX_ENGINE_TENANT_ID>.<TAKTX_ENGINE_NAMESPACE>.*
        - TAKTX_LICENSE_FILE_LOCATION=/opt/taktx/licence.lic

        # ── Command Authorization (RS256 JWT) ──────────────────────────────
        # Enable when running alongside the TaktX Console / Platform Service.
        # Set TAKTX_PLATFORM_PUBLIC_KEY to the base64-DER RSA public key from:
        #   GET http://<platform-service>/api/public-key
        - TAKTX_SECURITY_AUTHORIZATION_ENABLED=false
        - TAKTX_SECURITY_REJECT_EXPIRED=true
        - TAKTX_SECURITY_NONCE_CHECK=true
        # - TAKTX_PLATFORM_PUBLIC_KEY=<base64-DER RSA public key from platform service>

        # ── Engine Message Signing (Ed25519) ───────────────────────────────
        # When enabled the engine signs every instance-update, external-task-trigger
        # and user-task-trigger record with Ed25519. Workers and the ingester verify
        # these signatures using the public key published to taktx-signing-keys.
        - TAKTX_SECURITY_SIGNING_ENABLED=false
        # Required when signing is enabled — uniquely identifies this engine's key.
        # Must match the key registered in the global configuration signing event.
        # - TAKTX_SIGNING_KEY_ID=engine-key-1
        # The Ed25519 private key (base64-encoded PKCS8 DER). Inject as a Docker secret
        # or via a secrets manager — never hardcode in production.
        # Generate with: openssl genpkey -algorithm ed25519 | openssl pkcs8 -topk8 -nocrypt | base64
        # - TAKTX_SIGNING_PRIVATE_KEY=<base64-encoded Ed25519 private key>

    volumes:
      - ~/.taktx/license.lic:/opt/taktx/licence.lic:ro

  prometheus:
    image: prom/prometheus
    ports:
      - 9090:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - 3000:3000
    volumes:
      - "./grafana/data:/var/lib/grafana"
      - "./grafana/provisioning:/etc/grafana/provisioning"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
