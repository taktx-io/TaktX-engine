# ============================================================================
# TaktX — Level 4 overlay: Anchored trust chain (root of trust)
# ============================================================================
# Activates root-trust-chain enforcement: the engine's signing key must be
# registered against a platform root public key. Workers that also present
# a valid registration signature are accepted; all others are rejected.
#
# This overlay REQUIRES docker-compose.file-signing.yml to be applied first —
# anchored mode needs a stable, non-rotating key.
#
# Prerequisites:
#   1. Generate engine key files (see docker-compose.file-signing.yml)
#   2. Generate platform root key + registration signature:
#        scripts/generate_trust_anchor.sh \
#          --sign \
#          --key-dir docker/signing/engine \
#          --owner acme-engine \
#          --role ENGINE
#   3. Copy the printed values into the environment variables below.
#
# Usage:
#   docker compose \
#     -f docker-compose.yaml \
#     -f docker-compose.file-signing.yml \
#     -f docker-compose.anchored.yml up
#
# With monitoring:
#   docker compose \
#     -f docker-compose.yaml \
#     -f docker-compose.monitoring.yml \
#     -f docker-compose.file-signing.yml \
#     -f docker-compose.anchored.yml up
# ============================================================================

services:
  taktx:
    environment:
      # Base64-encoded Ed25519 X.509 DER public key of the platform root CA.
      # Generated by: scripts/generate_trust_anchor.sh --init-platform
      TAKTX_PLATFORM_PUBLIC_KEY: ""

      # RSA/SHA-256 signature over: keyId|publicKeyBase64|Ed25519|<owner>|ENGINE
      # Generated by: scripts/generate_trust_anchor.sh --sign ...
      TAKTX_ENGINE_KEY_REGISTRATION_SIGNATURE: ""

