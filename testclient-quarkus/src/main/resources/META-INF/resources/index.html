<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaktX Process Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <!-- BPMN.js dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bpmn-js@15.2.2/dist/bpmn-navigated-viewer.production.min.js"></script>
</head>
<body>
    <div class="container-fluid vh-100 d-flex flex-column">
        <header class="row bg-dark text-white p-3">
            <div class="col">
                <h1>TaktX Process Monitor</h1>
            </div>
        </header>

        <div class="row flex-grow-1 position-relative">
            <!-- Process definitions list -->
            <div id="definitions-panel" class="col-md-4 bg-light p-0 d-flex flex-column resizable-panel">
                <div class="p-3 bg-secondary text-white">
                    <h3>Process Definitions</h3>
                </div>
                <div class="list-container p-2 flex-grow-1 overflow-auto">
                    <div id="process-definitions-list">
                        <p class="loading-text">Loading process definitions...</p>
                    </div>
                </div>
                <div class="resize-handle resize-handle-horizontal"></div>
            </div>

            <!-- BPMN Diagram view -->
            <div id="content-panel" class="p-0 d-flex flex-column">
                <div class="p-3 bg-secondary text-white">
                    <h3 id="diagram-title">BPMN Diagram</h3>
                </div>
                <div id="bpmn-container" class="flex-grow-1">
                    <div id="bpmn-canvas" class="diagram-canvas"></div>
                </div>

                <!-- Process instance list section with a refresh button -->
                <div id="instances-container" class="position-relative">
                    <div class="resize-handle resize-handle-vertical"></div>
                    <div id="instances-panel" class="process-instances bg-light border-top resizable-panel-vertical">
                        <div class="p-3">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h4>Process Instances</h4>
                                <button id="refresh-instances-btn" class="btn btn-sm btn-primary">
                                    <i class="bi bi-arrow-clockwise"></i> Refresh
                                </button>
                            </div>
                            <div class="row">
                                <!-- Process Instances Column -->
                                <div class="col-md-6">
                                    <div id="process-instances-list" class="process-instances-container">
                                        <p class="text-muted">Select a process definition to view instances</p>
                                    </div>
                                </div>
                                <!-- Flow Node Instances Column -->
                                <div class="col-md-6 border-start">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <h5>Flow Node Instances</h5>
                                        <button id="refresh-flownodes-btn" class="btn btn-sm btn-secondary" disabled>
                                            <i class="bi bi-arrow-clockwise"></i> Refresh
                                        </button>
                                    </div>
                                    <div id="flow-node-instances-list" class="flow-node-instances-container">
                                        <p class="text-muted">Select a process instance to view flow nodes</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
