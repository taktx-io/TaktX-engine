<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaktX Process Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- BPMN-JS Viewer -->
    <link rel="stylesheet" href="https://unpkg.com/bpmn-js@12.0.0/dist/assets/bpmn-js.css">
    <style>
        body {
            padding-top: 20px;
        }
        .sidebar {
            height: calc(100vh - 60px);
            overflow-y: auto;
        }
        .bpmn-canvas {
            height: calc(100vh - 60px);
            border: 1px solid #ccc;
            overflow: hidden;
        }
        .process-definition {
            cursor: pointer;
        }
        .process-instance {
            cursor: pointer;
        }
        .process-definition.active, .process-instance.active {
            background-color: #e7f1ff;
        }
        .version-group {
            border-left: 3px solid #6c757d;
            margin-left: 10px;
            padding-left: 10px;
        }
        #connectionStatus {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .connected {
            background-color: #28a745;
        }
        .disconnected {
            background-color: #dc3545;
        }
        .connecting {
            background-color: #ffc107;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row mb-3">
            <div class="col-12">
                <h1 class="d-inline">TaktX Process Monitor</h1>
                <div class="float-end mt-2">
                    <span id="connectionStatus" class="disconnected"></span>
                    <span id="connectionText">Disconnected</span>
                </div>
            </div>
        </div>
        
        <div class="row">
            <!-- Left sidebar -->
            <div class="col-md-3">
                <div class="card sidebar">
                    <div class="card-header">
                        <h5>Process Definitions</h5>
                    </div>
                    <div class="card-body p-0">
                        <div id="processDefinitionsList" class="list-group list-group-flush">
                            <!-- Process definitions will be loaded here -->
                            <div class="p-3 text-muted">Loading definitions...</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Middle section - Process Instances -->
            <div class="col-md-3">
                <div class="card sidebar">
                    <div class="card-header">
                        <h5>Process Instances</h5>
                        <small id="selectedDefinitionLabel" class="text-muted">Select a process definition</small>
                    </div>
                    <div class="card-body p-0">
                        <div id="processInstancesList" class="list-group list-group-flush">
                            <!-- Process instances will be loaded here -->
                            <div class="p-3 text-muted">Select a process definition</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- BPMN Diagram -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>BPMN Process Diagram</h5>
                        <small id="selectedInstanceLabel" class="text-muted">Select a process instance</small>
                    </div>
                    <div class="card-body p-0">
                        <div id="bpmnCanvas" class="bpmn-canvas">
                            <!-- BPMN diagram will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/bpmn-js@12.0.0/dist/bpmn-navigated-viewer.development.js"></script>
    <script src="js/process-monitor.js"></script>
</body>
</html>
