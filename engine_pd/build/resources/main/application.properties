# Configure the Kafka broker location
quarkus.http.port=8081

mp.messaging.incoming.process-definition-xml-incoming.connector=smallrye-kafka
mp.messaging.incoming.process-definition-xml-incoming.topic=process-definition-xml-topic

mp.messaging.incoming.process-definition-parsed-incoming.connector=smallrye-kafka
mp.messaging.incoming.process-definition-parsed-incoming.topic=process-definition-parsed-topic
mp.messaging.incoming.process-definition-parsed-incoming.auto.offset.reset=earliest

mp.messaging.outgoing.process-definition-parsed-outgoing.connector=smallrye-kafka
mp.messaging.outgoing.process-definition-parsed-outgoing.topic=process-definition-parsed-topic
mp.messaging.outgoing.process-definition-parsed-outgoing.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
