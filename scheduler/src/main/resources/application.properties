# Configure the Kafka broker location
kafka.bootstrap.servers=localhost:9092
quarkus.http.port=8081
quarkus.scheduler.start-mode=forced
spring.kafka.consumer.auto-offset-reset=earliest

mp.messaging.incoming.one-time.topic=one-time-schedule-commands
mp.messaging.incoming.one-time.group.id=one-time-command-scheduler
mp.messaging.incoming.one-time.connector=smallrye-kafka

mp.messaging.incoming.recurring.topic=recurring-schedule-commands
mp.messaging.incoming.recurring.group.id=recurring-command-scheduler
mp.messaging.incoming.recurring.connector=smallrye-kafka

mp.messaging.incoming.fixed-rate.topic=fixed-rate-schedule-commands
mp.messaging.incoming.fixed-rate.group.id=fixed-rate-command-scheduler
mp.messaging.incoming.fixed-rate.connector=smallrye-kafka

mp.messaging.outgoing.outgoing.connector=smallrye-kafka
mp.messaging.outgoing.outgoing.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.outgoing.key.serializer=org.apache.kafka.common.serialization.UUIDSerializer

mp.messaging.outgoing.one-time-out.connector=smallrye-kafka
mp.messaging.outgoing.one-time-out.key.serializer=org.apache.kafka.common.serialization.UUIDSerializer
mp.messaging.outgoing.one-time-out.value.serializer=org.apache.kafka.common.serialization.VoidSerializer

mp.messaging.outgoing.fixed-rate-out.connector=smallrye-kafka
mp.messaging.outgoing.fixed-rate-out.key.serializer=org.apache.kafka.common.serialization.UUIDSerializer
mp.messaging.outgoing.fixed-rate-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
