name: Feature Request
description: Suggest a new feature or enhancement for TaktX Engine
title: "[feat]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest a feature! Please provide as much context as possible
        to help us understand the use case.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        What problem are you trying to solve? Describe the use case or workflow that is currently
        not possible or unnecessarily difficult.
      placeholder: "When I try to ... I find that ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        Describe the feature you'd like to see. Be as specific as possible — include
        API sketches, configuration properties, or BPMN element names if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?
    validations:
      required: false

  - type: dropdown
    id: module
    attributes:
      label: Affected Module(s)
      multiple: true
      options:
        - taktx-engine
        - taktx-client
        - taktx-client-spring
        - taktx-client-quarkus
        - taktx-shared
        - Documentation
        - Other / Not sure
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references that might help.
    validations:
      required: false

