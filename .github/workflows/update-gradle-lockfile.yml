name: Regenerate Gradle Lock Files

# Use this when:
#   - A dependency was updated manually in libs.versions.toml
#   - Renovate's gradleLockfileUpdate post-update step failed on a PR
#   - You need to refresh locks after adding a new dependency
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to push updated lock files to (defaults to current branch)'
        required: false
        default: ''
      open_pr:
        description: 'Open a pull request with the changes?'
        required: false
        default: true
        type: boolean

jobs:
  update-lockfiles:
    name: Write Gradle lock files
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Regenerate root lock file
        run: ./gradlew dependencies --write-locks

      - name: Regenerate subproject lock files
        run: |
          for project in taktx-engine taktx-client taktx-client-quarkus taktx-client-spring-boot-3 taktx-client-spring-boot-4 taktx-shared; do
            echo "▶ Updating lock files for :$project"
            ./gradlew ":${project}:dependencies" --write-locks || echo "⚠ Skipped $project (no lockfile configured)"
          done

      - name: Check for changes
        id: check_changes
        run: |
          git diff --name-only
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ Lock files are already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "📝 Lock file changes detected."
          fi

      - name: Open pull request with updated lock files
        if: steps.check_changes.outputs.changed == 'true' && inputs.open_pr == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): regenerate Gradle lock files"
          branch: chore/update-gradle-lockfiles
          delete-branch: true
          title: "chore(deps): regenerate Gradle lock files"
          body: |
            Automated regeneration of Gradle lock files triggered via `workflow_dispatch`.

            Lock files are regenerated by running:
            ```
            ./gradlew dependencies --write-locks
            ./gradlew :<subproject>:dependencies --write-locks
            ```

            Review the diff to confirm only expected version pins changed.
          labels: |
            dependencies
            gradle

      - name: Commit directly to branch (no PR)
        if: steps.check_changes.outputs.changed == 'true' && inputs.open_pr == 'false'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "*.lockfile" "**/gradle.lockfile"
          git commit -m "chore(deps): regenerate Gradle lock files [skip ci]"
          git push


