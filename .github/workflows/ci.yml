# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'release/**'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Skip this job if it's a pull_request event on a branch that belongs to the same repository
    # This prevents duplicate runs when pushing to a feature branch with an open PR
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport

      - name: Upload coverage to Codecov - taktx-engine
        uses: codecov/codecov-action@v4
        with:
          files: ./taktx-engine/build/reports/jacoco/test/jacocoTestReport.xml
          flags: taktx-engine
          name: taktx-engine-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov - taktx-client
        uses: codecov/codecov-action@v4
        with:
          files: ./taktx-client/build/reports/jacoco/test/jacocoTestReport.xml
          flags: taktx-client
          name: taktx-client-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov - taktx-client-quarkus
        uses: codecov/codecov-action@v4
        with:
          files: ./taktx-client-quarkus/build/reports/jacoco/test/jacocoTestReport.xml
          flags: taktx-client-quarkus
          name: taktx-client-quarkus-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov - taktx-shared
        uses: codecov/codecov-action@v4
        with:
          files: ./taktx-shared/build/reports/jacoco/test/jacocoTestReport.xml
          flags: taktx-shared
          name: taktx-shared-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

