name: Security Vulnerability Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 07:00 UTC to catch newly published CVEs between dependency updates
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  trivy-scan:
    name: Trivy — filesystem & dependency scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # Required to upload SARIF results to GitHub Security tab

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Run Trivy vulnerability scanner (SARIF)
        run: |
          trivy fs \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --scanners vuln,secret \
            .

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-fs'

      - name: Run Trivy in table format (CI log summary)
        run: |
          trivy fs \
            --format table \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --scanners vuln,secret \
            .
