name: Update Coverage Badges

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  update-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Run full test suite and refresh coverage badges
        run: ./gradlew testWithBadges

      - name: Display coverage summary
        run: |
          echo "📊 Coverage Summary:"
          cat badges/coverage-summary.json
          echo ""
          ls -lh badges/*.svg

      - name: Commit and push badges
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add badges/*.svg badges/coverage-summary.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update coverage badges [skip ci]"
            git push
          fi

