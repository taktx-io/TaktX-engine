name: Release

on:
  release:
    types: [ published ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for Git-based versioning
          token: ${{ secrets.GITHUB_TOKEN }}  # Explicitly use the token for authentication
          ref: ${{ github.event.repository.default_branch }}  # Explicitly checkout the default branch

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Extract version
        id: extract_version
        run: |
          # Handle both v-prefixed and non-v-prefixed tags
          TAG=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update version files
        run: |
          # Get default branch name
          DEFAULT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "Working on branch: $DEFAULT_BRANCH"
          
          # Configure git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Update root build.gradle.kts with version
          if ! grep -q "version = " build.gradle.kts; then
            # Add version if it doesn't exist
            echo "" >> build.gradle.kts
            echo "version = \"${{ steps.extract_version.outputs.VERSION }}\"" >> build.gradle.kts
          else
            # Update existing version
            sed -i "s/version = \".*\"/version = \"${{ steps.extract_version.outputs.VERSION }}\"/g" build.gradle.kts
          fi
          
          # Update module build.gradle.kts files with version
          for MODULE_BUILD in */build.gradle.kts; do
            if grep -q "version = " "$MODULE_BUILD"; then
              sed -i "s/version = \".*\"/version = \"${{ steps.extract_version.outputs.VERSION }}\"/g" "$MODULE_BUILD"
            fi
          done
          
          # Update Version Catalog if it exists
          if [ -f "gradle/libs.versions.toml" ]; then
            # Check if there's a project version in the catalog
            if grep -q "\[metadata\]" "gradle/libs.versions.toml"; then
              # Update existing metadata section with project version
              sed -i "/\[metadata\]/,/\[/ s/projectVersion = \".*\"/projectVersion = \"${{ steps.extract_version.outputs.VERSION }}\"/g" "gradle/libs.versions.toml"
            else
              # Add metadata section with project version
              echo -e "\n[metadata]\nprojectVersion = \"${{ steps.extract_version.outputs.VERSION }}\"" >> "gradle/libs.versions.toml"
            fi
          fi
          
          # Update VERSION.txt with new version info
          RELEASE_DATE=$(date +%Y-%m-%d)
          sed -i "s/Version:       .*/Version:       ${{ steps.extract_version.outputs.VERSION }}/g" VERSION.txt
          sed -i "s/Release Date:  .*/Release Date:  $RELEASE_DATE/g" VERSION.txt
          
          # Commit and push changes directly to the default branch
          git add build.gradle.kts */build.gradle.kts gradle/libs.versions.toml VERSION.txt
          
          # Only attempt to commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update versions to ${{ steps.extract_version.outputs.VERSION }} [skip ci]"
            
            # Handle potential branch protection by checking if direct push is allowed
            if git push origin $DEFAULT_BRANCH; then
              echo "::notice::Version updates pushed directly to $DEFAULT_BRANCH branch"
            else
              echo "::warning::Could not push directly to $DEFAULT_BRANCH. This may be due to branch protection rules."
              echo "Version updates will still be used for building artifacts in this workflow run."
            fi
          fi
          
          # Regardless of whether we could push, the local working directory has the updated files
          # for subsequent steps to use when building and publishing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate license change date
        run: |
          RELEASE_DATE=$(date +%Y-%m-%d)
          CHANGE_DATE=$(date -d "$RELEASE_DATE +4 years" +%Y-%m-%d)
          mkdir -p taktx-engine/src/main/resources/META-INF/
          echo "$CHANGE_DATE" > taktx-engine/src/main/resources/META-INF/LICENSE_CHANGE_DATE.txt
          # Also create a file for the Docker build to use
          echo "$CHANGE_DATE" > LICENSE_CHANGE_DATE.txt
          # Copy license file to taktx-engine directory for Docker build
          cp LICENSE.md taktx-engine/
          echo "CHANGE_DATE=$CHANGE_DATE" >> $GITHUB_ENV

      - name: Build uber jar with Gradle
        run: ./gradlew -Dquarkus.package.jar.type=uber-jar -x test --info

      - name: Debug - List workspace contents
        run: |
          echo "Current directory structure:"
          find / -name "*" 

      - uses: AButler/upload-release-assets@v3.0
        with:
          files: "taktx-engine/build/*.runner.jar"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

