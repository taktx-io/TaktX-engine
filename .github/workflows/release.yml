name: Release

on:
  release:
    types: [ published ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for Git-based versioning
          token: ${{ secrets.GITHUB_TOKEN }}  # Explicitly use the token for authentication

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh

      - name: Extract version
        id: extract_version
        run: |
          # Handle both v-prefixed and non-v-prefixed tags
          TAG=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Commit version updates
        run: |
          # Determine default branch
          DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d' ' -f5)
          echo "Default branch is $DEFAULT_BRANCH"
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Create a new branch from the current default branch
          git fetch origin $DEFAULT_BRANCH
          git checkout -b version-bump-${{ steps.extract_version.outputs.VERSION }} origin/$DEFAULT_BRANCH
          
          # Apply version changes
          # Update root build.gradle.kts with version
          if ! grep -q "version = " build.gradle.kts; then
            # Add version if it doesn't exist
            echo "" >> build.gradle.kts
            echo "version = \"${{ steps.extract_version.outputs.VERSION }}\"" >> build.gradle.kts
          else
            # Update existing version
            sed -i "s/version = \".*\"/version = \"${{ steps.extract_version.outputs.VERSION }}\"/g" build.gradle.kts
          fi
          
          # Update module build.gradle.kts files with version
          for MODULE_BUILD in */build.gradle.kts; do
            if grep -q "version = " "$MODULE_BUILD"; then
              sed -i "s/version = \".*\"/version = \"${{ steps.extract_version.outputs.VERSION }}\"/g" "$MODULE_BUILD"
            fi
          done
          
          # Update Version Catalog if it exists
          if [ -f "gradle/libs.versions.toml" ]; then
            # Check if there's a project version in the catalog
            if grep -q "\[metadata\]" "gradle/libs.versions.toml"; then
              # Update existing metadata section with project version
              sed -i "/\[metadata\]/,/\[/ s/projectVersion = \".*\"/projectVersion = \"${{ steps.extract_version.outputs.VERSION }}\"/g" "gradle/libs.versions.toml"
            else
              # Add metadata section with project version
              echo -e "\n[metadata]\nprojectVersion = \"${{ steps.extract_version.outputs.VERSION }}\"" >> "gradle/libs.versions.toml"
            fi
          fi
          
          # Update VERSION.txt with new version info
          RELEASE_DATE=$(date +%Y-%m-%d)
          sed -i "s/Version:       .*/Version:       ${{ steps.extract_version.outputs.VERSION }}/g" VERSION.txt
          sed -i "s/Release Date:  .*/Release Date:  $RELEASE_DATE/g" VERSION.txt
          
          # Commit and push changes
          git add build.gradle.kts */build.gradle.kts gradle/libs.versions.toml VERSION.txt
          
          # Only attempt to commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update versions to ${{ steps.extract_version.outputs.VERSION }} [skip ci]"
            git push origin version-bump-${{ steps.extract_version.outputs.VERSION }}
            
            # Create PR using GitHub CLI
            gh pr create --base $DEFAULT_BRANCH \
              --head version-bump-${{ steps.extract_version.outputs.VERSION }} \
              --title "Update versions to ${{ steps.extract_version.outputs.VERSION }} [skip ci]" \
              --body "This PR updates versions in Gradle files, Version Catalog, and VERSION.txt to match the released version ${{ steps.extract_version.outputs.VERSION }}. IMPORTANT: This PR is created automatically by the release process. It should be merged without additional CI runs. The commit message includes [skip ci] to prevent redundant workflow runs."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate license change date
        run: |
          RELEASE_DATE=$(date +%Y-%m-%d)
          CHANGE_DATE=$(date -d "$RELEASE_DATE +4 years" +%Y-%m-%d)
          mkdir -p taktx-engine/src/main/resources/META-INF/
          echo "$CHANGE_DATE" > taktx-engine/src/main/resources/META-INF/LICENSE_CHANGE_DATE.txt
          # Also create a file for the Docker build to use
          echo "$CHANGE_DATE" > LICENSE_CHANGE_DATE.txt
          # Copy license file to taktx-engine directory for Docker build
          cp LICENSE.md taktx-engine/
          echo "CHANGE_DATE=$CHANGE_DATE" >> $GITHUB_ENV

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Build Docker image
        run: |
          # Copy the LICENSE_CHANGE_DATE.txt file to the taktx-engine directory for Docker build
          cp LICENSE_CHANGE_DATE.txt taktx-engine/
          
          docker build \
            --build-arg VERSION=${{ steps.extract_version.outputs.VERSION }} \
            --build-arg CHANGE_DATE=${{ env.CHANGE_DATE }} \
            -f taktx-engine/Dockerfile.jvm \
            -t ghcr.io/${{ github.repository_owner }}/taktx-engine:${{ steps.extract_version.outputs.VERSION }} \
            -t ghcr.io/${{ github.repository_owner }}/taktx-engine:latest \
            taktx-engine/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/taktx-engine:${{ steps.extract_version.outputs.VERSION }}
          docker push ghcr.io/${{ github.repository_owner }}/taktx-engine:latest

      - name: Publish to Maven Central
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          SIGNING_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.GPG_PASSPHRASE }}