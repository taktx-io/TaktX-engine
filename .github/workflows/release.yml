name: Release

on:
  release:
    types: [ published ]        # triggered when you publish a release via the GitHub UI
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      update_version_files:
        description: 'Update version files'
        required: false
        type: boolean
        default: true
      build_docker_images:
        description: 'Build and push Docker images'
        required: false
        type: boolean
        default: true
      build_uber_jar:
        description: 'Build uber-jar and upload to release'
        required: false
        type: boolean
        default: true
      publish_maven_central:
        description: 'Publish to Maven Central'
        required: false
        type: boolean
        default: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for Git-based versioning
          token: ${{ secrets.GITHUB_TOKEN }}
          # Always build from the exact commit that was tagged/released.
          # For release events this is the tagged commit; for workflow_dispatch it
          # is the HEAD of the branch/tag selected by the operator.
          ref: ${{ github.sha }}

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: gradle

      - name: Extract version
        id: extract_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger – use input version
            VERSION="${{ inputs.version }}"
          else
            # release: published event – tag is in GITHUB_REF
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}   # strip optional 'v' prefix
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update version files
        if: github.event_name != 'workflow_dispatch' || inputs.update_version_files
        run: |
          # Get default branch name
          DEFAULT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "Working on branch: $DEFAULT_BRANCH"
          
          # Configure git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Update root build.gradle.kts with version
          if ! grep -q "version = " build.gradle.kts; then
            # Add version if it doesn't exist
            echo "" >> build.gradle.kts
            echo "version = \"${{ steps.extract_version.outputs.VERSION }}\"" >> build.gradle.kts
          else
            # Update existing version
            sed -i "s/version = \".*\"/version = \"${{ steps.extract_version.outputs.VERSION }}\"/g" build.gradle.kts
          fi
          
          # Update module build.gradle.kts files with version
          for MODULE_BUILD in */build.gradle.kts; do
            if grep -q "version = " "$MODULE_BUILD"; then
              sed -i "s/version = \".*\"/version = \"${{ steps.extract_version.outputs.VERSION }}\"/g" "$MODULE_BUILD"
            fi
          done
          
          # Update Version Catalog if it exists
          if [ -f "gradle/libs.versions.toml" ]; then
            # Check if there's a project version in the catalog
            if grep -q "\[metadata\]" "gradle/libs.versions.toml"; then
              # Update existing metadata section with project version
              sed -i "/\[metadata\]/,/\[/ s/projectVersion = \".*\"/projectVersion = \"${{ steps.extract_version.outputs.VERSION }}\"/g" "gradle/libs.versions.toml"
            else
              # Add metadata section with project version
              echo -e "\n[metadata]\nprojectVersion = \"${{ steps.extract_version.outputs.VERSION }}\"" >> "gradle/libs.versions.toml"
            fi
          fi
          
          # Update VERSION.txt with new version info
          RELEASE_DATE=$(date +%Y-%m-%d)
          sed -i "s/Version:       .*/Version:       ${{ steps.extract_version.outputs.VERSION }}/g" VERSION.txt
          sed -i "s/Release Date:  .*/Release Date:  $RELEASE_DATE/g" VERSION.txt
          
          # Update version badge in root README.md
          # Converts e.g. 0.3.0-beta-1 → 0.3.0--beta--1 (shields.io requires double-dash for literal dash)
          BADGE_VERSION=$(echo "${{ steps.extract_version.outputs.VERSION }}" | sed 's/-/--/g')
          sed -i "s|version-[^-]*--[^)]*|version-${BADGE_VERSION}|g" README.md
          
          # Update Maven/Gradle install snippets in all module READMEs
          for README in taktx-client/README.md taktx-client-quarkus/README.md taktx-client-spring-boot-3/README.md taktx-client-spring-boot-4/README.md taktx-shared/README.md; do
            if [ -f "$README" ]; then
              # Maven <version> tag (indented)
              sed -i "s|<version>[0-9][^<]*</version>|<version>${{ steps.extract_version.outputs.VERSION }}</version>|g" "$README"
              # Gradle implementation string
              sed -i 's|implementation("io\.taktx:\([^:]*\):[^"]*")|implementation("io.taktx:\1:${{ steps.extract_version.outputs.VERSION }}")|g' "$README"
            fi
          done
          
          # Commit and push changes directly to the default branch
          git add build.gradle.kts */build.gradle.kts gradle/libs.versions.toml VERSION.txt README.md taktx-*/README.md
          
          # Only attempt to commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update versions to ${{ steps.extract_version.outputs.VERSION }} [skip ci]"
            
            # Handle potential branch protection by checking if direct push is allowed
            if git push origin $DEFAULT_BRANCH; then
              echo "::notice::Version updates pushed directly to $DEFAULT_BRANCH branch"
            else
              echo "::warning::Could not push directly to $DEFAULT_BRANCH. This may be due to branch protection rules."
              echo "Version updates will still be used for building artifacts in this workflow run."
            fi
          fi
          
          # Regardless of whether we could push, the local working directory has the updated files
          # for subsequent steps to use when building and publishing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        if: github.event_name != 'workflow_dispatch' || inputs.build_docker_images
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'workflow_dispatch' || inputs.build_docker_images
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AMD64 image
        if: github.event_name != 'workflow_dispatch' || inputs.build_docker_images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./taktx-engine/Dockerfile.jvm
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/taktx-engine:${{ steps.extract_version.outputs.VERSION }}-amd64
          build-args: |
            VERSION=${{ steps.extract_version.outputs.VERSION }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

      - name: Set up QEMU for ARM64
        if: github.event_name != 'workflow_dispatch' || inputs.build_docker_images
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and push ARM64 image
        if: github.event_name != 'workflow_dispatch' || inputs.build_docker_images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./taktx-engine/Dockerfile.jvm
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/taktx-engine:${{ steps.extract_version.outputs.VERSION }}-arm64
          build-args: |
            VERSION=${{ steps.extract_version.outputs.VERSION }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

      - name: Create and push multi-platform manifest
        if: github.event_name != 'workflow_dispatch' || inputs.build_docker_images
        run: |
          # Create manifest list that points to both platform-specific images
          docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/taktx-engine:${{ steps.extract_version.outputs.VERSION }} \
            ghcr.io/${{ github.repository_owner }}/taktx-engine:${{ steps.extract_version.outputs.VERSION }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/taktx-engine:${{ steps.extract_version.outputs.VERSION }}-arm64
          
          # Also tag as latest
          docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/taktx-engine:latest \
            ghcr.io/${{ github.repository_owner }}/taktx-engine:${{ steps.extract_version.outputs.VERSION }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/taktx-engine:${{ steps.extract_version.outputs.VERSION }}-arm64

      - name: Build uber-jar for release artifact
        if: github.event_name != 'workflow_dispatch' || inputs.build_uber_jar
        run: |
          # Build uber-jar directly with Gradle (much simpler than extracting from Docker)
          ./gradlew :taktx-engine:quarkusBuild -Dquarkus.package.jar.type=uber-jar -x test

      # Upload the uber-jar to the GitHub Release that triggered this workflow.
      # Only runs on `release: published` events — workflow_dispatch has no release object.
      - name: Upload uber-jar to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: taktx-engine/build/*runner.jar

      - name: Publish to Maven Central
        if: github.event_name != 'workflow_dispatch' || inputs.publish_maven_central
        # Stage all publications first, then deploy each module so that every
        # staging repository is fully populated before any bundle hits Central.
        run: |
          ./gradlew \
            :taktx-shared:publishMavenJavaPublicationToMavenRepository \
            :taktx-client:publishMavenJavaPublicationToMavenRepository \
            :taktx-client-quarkus:publishMavenJavaPublicationToMavenRepository \
            :taktx-client-spring-boot-3:publishMavenJavaPublicationToMavenRepository \
            :taktx-client-spring-boot-4:publishMavenJavaPublicationToMavenRepository

          ./gradlew \
            :taktx-shared:jreleaserDeploy \
            :taktx-client:jreleaserDeploy \
            :taktx-client-quarkus:jreleaserDeploy \
            :taktx-client-spring-boot-3:jreleaserDeploy \
            :taktx-client-spring-boot-4:jreleaserDeploy
        env:
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
