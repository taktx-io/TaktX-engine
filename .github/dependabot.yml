# Dependabot configuration optimized for Gradle Version Catalog
# Documentation: https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Gradle dependencies (including Version Catalog)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    groups:
      # Group Quarkus-related dependencies together
      quarkus:
        patterns:
          - "io.quarkus*"
        update-types:
          - "minor"
          - "patch"
      
      # Group Jackson dependencies together
      jackson:
        patterns:
          - "com.fasterxml.jackson*"
        update-types:
          - "minor"
          - "patch"
      
      # Group testing libraries together
      testing:
        patterns:
          - "org.junit*"
          - "org.assertj*"
          - "org.mockito*"
          - "org.testcontainers*"
        update-types:
          - "minor"
          - "patch"
      
      # Group plugins together
      gradle-plugins:
        patterns:
          - "*plugins*"
        update-types:
          - "minor"
          - "patch"
    
    # Ignore major version updates for stability unless manually reviewed
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    
    # Configuration to handle the Version Catalog
    versioning-strategy: auto

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "actions/*"
