# Dependency version updates are managed by Renovate Bot.
# See renovate.json for the full configuration.
#
# Why Renovate instead of Dependabot for Gradle?
#   - Native support for Gradle Version Catalog (libs.versions.toml)
#   - Automatically regenerates gradle.lockfile via postUpdateOptions
#   - Smarter grouping and auto-merge rules
#   - OSV vulnerability alerts included
#
# Renovate setup (one-time): install the free Mend Renovate GitHub App at
#   https://github.com/apps/renovate
#
# Dependabot SECURITY ALERTS remain active independently of this file
# (configured in: GitHub repo → Settings → Security → Code security).
# Dependabot will still open security-fix PRs for known CVEs automatically.

version: 2

# Version updates are fully handled by Renovate Bot (see renovate.json).
# Having an empty updates list keeps this file valid and ensures that
# Dependabot security-alert PRs (which are independent of this file) continue to work.
updates: []

# To revert to Dependabot for version updates, replace the empty array above with:
#
# updates:
#   - package-ecosystem: "gradle"
#     directory: "/"
#     schedule:
#       interval: "weekly"
#     versioning-strategy: auto
#
#   - package-ecosystem: "github-actions"
#     directory: "/"
#     schedule:
#       interval: "weekly"
