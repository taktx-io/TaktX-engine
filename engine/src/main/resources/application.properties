# Required connection configs for Kafka producer, consumer, and admin
%confluent.kafka.sasl.mechanism=PLAIN
%confluent.kafka.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username='U6CHJH3OBI3U2JA5' password='eaVYhrRK7MbCm1liZCCRM0FuWFF2zgatZAyZ1p4SMSGX7K9tGMfPcAQba4/9xynD';
%confluent.kafka.security.protocol=SASL_SSL

# Best practice for higher availability in Apache Kafka clients prior to 3.0
%confluent.kafka.session.timeout.ms=10000

quarkus.http.port=8081
quarkus.kafka-streams.application-server=${hostname}:8081
quarkus.kafka-streams.topics=definitions-topic,process-definition-parsed-topic,process-definition-activation-topic,process-definition-xml-topic,schedule-commands,process-instance-trigger-topic,external-task-trigger-topic,process-migration-topic

kafka-streams.consumer.session.timeout.ms=10000
