%test.quarkus.kafka.devservices.enabled=false
%test.quarkus.arc.selected-alternatives=nl.qunit.bpmnmeister.engine.pd.FixedClockProducer,nl.qunit.bpmnmeister.engine.pd.InMemoryKeyValueStoreSupplier

