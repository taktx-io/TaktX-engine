# Quarkus application properties for taktx-ingesters-full-updates-cassandra
quarkus.application.name=taktx-ingesters-full-updates-cassandra
quarkus.http.port=8084
quarkus.analytics.disabled=true

#taktx engine configuration
bootstrap.servers=localhost:9092
taktx.engine.namespace=namespace
taktx.client.groupId.instanceupdate=taktx-ingesters-full-updates-cassandra

# Cassandra configuration (to be customized)
quarkus.cassandra.contact-points=localhost:9042
quarkus.cassandra.keyspace=taktx_updates
quarkus.cassandra.local-datacenter=datacenter1
